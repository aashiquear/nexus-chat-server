# ============================================================
# Nexus Chat - Configuration
# ============================================================
# Edit this file to configure LLM providers, tools, and RAG.
# Restart the server after making changes.
# ============================================================

app:
  name: "Nexus Chat"
  version: "0.1.0"
  host: "0.0.0.0"
  port: 8000
  debug: false
  # Secret key for sessions (change in production!)
  secret_key: "change-me-in-production"

# ------------------------------------------------------------
# LLM Providers
# ------------------------------------------------------------
# Enable/disable providers and set API keys here.
# You can also set keys via environment variables:
#   ANTHROPIC_API_KEY, OPENAI_API_KEY
# ------------------------------------------------------------
providers:
  anthropic:
    enabled: true
    api_key: "${ANTHROPIC_API_KEY}"  # Set via env var or paste key here
    default_model: "claude-sonnet-4-6"
    # The /v1/models probe will mark each entry as available or
    # unavailable based on what the API key actually has access to.
    models:
      # --- Latest Claude 4.x line ---
      - id: "claude-opus-4-7"
        name: "Claude Opus 4.7"
        max_tokens: 8192
      - id: "claude-opus-4-6"
        name: "Claude Opus 4.6"
        max_tokens: 8192
      - id: "claude-sonnet-4-6"
        name: "Claude Sonnet 4.6"
        max_tokens: 8192
      - id: "claude-haiku-4-5-20251001"
        name: "Claude Haiku 4.5"
        max_tokens: 8192
      # --- Older 4.x ---
      - id: "claude-sonnet-4-20250514"
        name: "Claude Sonnet 4 (May 2025)"
        max_tokens: 8192

  openai:
    enabled: true
    api_key: "${OPENAI_API_KEY}"
    default_model: "gpt-5"
    # Reasoning models (gpt-5, o-series) consult ``thinking_level`` to
    # set ``reasoning_effort`` on the API; non-reasoning models ignore
    # the flag entirely.
    models:
      # --- GPT-5 family (reasoning) ---
      - id: "gpt-5"
        name: "GPT-5"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "gpt-5-mini"
        name: "GPT-5 Mini"
        max_tokens: 8192
        thinking: true
        thinking_level: "low"
      - id: "gpt-5-nano"
        name: "GPT-5 Nano"
        max_tokens: 4096
        thinking: true
        thinking_level: "minimal"
      # --- o-series (reasoning) ---
      - id: "o3"
        name: "OpenAI o3"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "o3-mini"
        name: "OpenAI o3-mini"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "o4-mini"
        name: "OpenAI o4-mini"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      # --- 4.x family ---
      - id: "gpt-4.1"
        name: "GPT-4.1"
        max_tokens: 8192
      - id: "gpt-4o"
        name: "GPT-4o"
        max_tokens: 4096
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        max_tokens: 4096

  ollama:
    enabled: true
    # For local Ollama: http://localhost:11434
    # For Ollama Cloud: https://ollama.com/api (requires OLLAMA_API_KEY)
    base_url: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    api_key: "${OLLAMA_API_KEY}"  # Required for Ollama Cloud, leave empty for local
    default_model: "llama3.2"
    # ----
    # Thinking models: set ``thinking: true`` (or ``thinking_level`` in
    # {low, medium, high}) to make Ollama emit the model's thought
    # process. Non-thinking models leave the field unset and are
    # unaffected — switching between the two just works.
    #
    # The Nexus sidebar greys out any model that isn't currently
    # available on the connected Ollama server (i.e. not yet pulled
    # locally, or not in your Ollama Cloud catalog), so it's safe to
    # list aspirational tags below — they'll just be marked unavailable
    # until the server actually has them.
    # ----
    models:
      # --- Cloud models (Ollama Cloud) ---
      - id: "gpt-oss:120b-cloud"
        name: "GPT-OSS 120B (cloud)"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "qwen3-coder:480b-cloud"
        name: "Qwen 3 Coder 480B (cloud)"
        max_tokens: 8192
      - id: "deepseek-r1:671b-cloud"
        name: "DeepSeek-R1 671B (cloud)"
        max_tokens: 8192
        thinking: true
        thinking_level: "high"
      - id: "minimax-m2.7:cloud"
        name: "MiniMax M2.7 (cloud)"
        max_tokens: 8192
      - id: "glm-5.1:cloud"
        name: "GLM-5.1 (cloud)"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "kimi-k2.6:cloud"
        name: "Kimi-K2.6 (cloud)"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "ministral-3:14b-cloud"
        name: "Ministral 3 14B (cloud)"
        max_tokens: 8192
      - id: "devstral-2:123b-cloud"
        name: "Devstral 2 123B (cloud)"
        max_tokens: 8192

      # --- Local models: general ---
      - id: "gemma4:latest"
        name: "Gemma 4"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "gemma4:31b"
        name: "Gemma 4 31B"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "devstral-small-2:24b"
        name: "Devstral Small 2 24B"
        max_tokens: 8192
      - id: "ministral-3:14b"
        name: "Ministral 3 14B"
        max_tokens: 8192
      - id: "llama4:latest"
        name: "Llama 4"
        max_tokens: 8192
      - id: "qwen3.6:latest"
        name: "Qwen 3.6"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "qwen2.5:latest"
        name: "Qwen 2.5"
        max_tokens: 8192
      - id: "llama3.2"
        name: "Llama 3.2"
        max_tokens: 8192
      - id: "mistral"
        name: "Mistral"
        max_tokens: 8192
      - id: "codellama"
        name: "Code Llama"
        max_tokens: 4096

      # --- Local models: code generation (Claude-Opus-tier candidates) ---
      # Thinking flag follows the model family. Probe-confirmed tags only.
      - id: "qwen3-coder:30b"
        name: "Qwen 3 Coder 30B"
        max_tokens: 8192
      - id: "qwen3-coder-next:latest"
        name: "Qwen 3 Coder Next"
        max_tokens: 8192
      - id: "gag0/qwen35-opus-distil:latest"
        name: "Qwen 3.5 Opus-distilled"
        max_tokens: 8192
      - id: "qwen2.5-coder:32b"
        name: "Qwen 2.5 Coder 32B"
        max_tokens: 8192
      - id: "deepseek-coder-v2:16b"
        name: "DeepSeek Coder v2 16B"
        max_tokens: 8192
      - id: "deepseek-r1:32b"
        name: "DeepSeek-R1 32B"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"
      - id: "deepseek-r1:70b"
        name: "DeepSeek-R1 70B"
        max_tokens: 8192
        thinking: true
        thinking_level: "high"
      - id: "qwq:32b"
        name: "QwQ 32B (reasoning preview)"
        max_tokens: 8192
        thinking: true
        thinking_level: "medium"

# ------------------------------------------------------------
# Tools
# ------------------------------------------------------------
# Each tool is a Python module in backend/tools/
# Set enabled: true/false to toggle tools.
# To add a new tool:
#   1. Create a Python file in backend/tools/
#   2. Implement the Tool base class
#   3. Add an entry here
# ------------------------------------------------------------
tools:
  calculator:
    enabled: true
    name: "Calculator"
    description: "Evaluate mathematical expressions"
    icon: "calculator"

  web_search:
    enabled: true
    name: "Web Search"
    description: "Search the web for real-time, current, or factual information including weather, news, sports, finance, and dictionary lookups."
    icon: "search"
    config:
      api_key: "${SEARCH_API_KEY}"
      engine: "duckduckgo"  # or "google", "bing"

  code_executor:
    enabled: true
    name: "Code Executor"
    description: "Execute Python code in a sandboxed environment"
    icon: "code"
    config:
      timeout: 30
      max_memory_mb: 256

  datetime_tool:
    enabled: true
    name: "Date & Time"
    description: "Get current date, time, and timezone info"
    icon: "clock"

  file_reader:
    enabled: true
    name: "File Reader"
    description: "Read and parse uploaded files"
    icon: "file-text"

  svg_diagram:
    enabled: true
    name: "SVG Diagram"
    description: "Generate SVG architecture diagrams from descriptions"
    icon: "image"
    config:
      output_dir: "./data/uploads"

  graph_plotter:
    enabled: true
    name: "Graph Plotter"
    description: "Plot graphs (line, scatter, scatter_line, bar, grouped_bar, stacked_bar, count, pie, histogram, box, violin, area, heatmap, parity, regression) with advanced formatting"
    icon: "bar-chart"
    config:
      upload_dir: "./data/uploads"
      output_dir: "./data"

  image_synthesizer:
    enabled: true
    name: "Image Synthesizer"
    description: "Analyze images using local SmolVLM vision model and return textual descriptions"
    icon: "image"
    config:
      upload_dir: "./data/uploads"
      # Optional: custom cache directory for the SmolVLM model weights.
      # Defaults to HuggingFace's default cache (~/.cache/huggingface/).
      # model_cache_dir: "./data/models"

  file_generator:
    enabled: true
    name: "File Generator"
    description: "Generate PDF, DOCX, PPTX, and PNG files from content provided by the LLM"
    icon: "file-text"
    config:
      output_dir: "./data/files"

# ------------------------------------------------------------
# MCP Servers (Model Context Protocol)
# ------------------------------------------------------------
# MCP servers are now added dynamically via the UI.
# Use the "+" button in the MCP Servers sidebar panel to
# discover and add a server by its URL.
# ------------------------------------------------------------
mcp_servers: {}

# ------------------------------------------------------------
# RAG (Retrieval-Augmented Generation)
# ------------------------------------------------------------
rag:
  enabled: true
  chunk_size: 1000
  chunk_overlap: 200
  # Embedding provider: "local" (sentence-transformers) or "openai"
  embedding_provider: "local"
  embedding_model: "all-MiniLM-L6-v2"
  # Vector store: "chroma" or "faiss"
  vector_store: "chroma"
  persist_directory: "./data/vector_store"
  # Max number of chunks to retrieve
  top_k: 5

# ------------------------------------------------------------
# File Upload
# ------------------------------------------------------------
uploads:
  # 5 GiB — large enough for modern datasets. The upload endpoint streams
  # the request body to disk in 1 MiB chunks, so memory stays bounded
  # regardless of this value.
  max_file_size_mb: 5120
  allowed_extensions: []  # Empty list = allow all file types
  upload_directory: "./data/uploads"
